agent {
    data_dir = "/opt/spire/data"
    log_level = "DEBUG"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/tmp/spire-agent/public/api.sock"
    trust_domain = "example.org"
    # Dev-only: skip validating the server's bootstrap bundle out of band.
    # Never use insecure_bootstrap in a real deployment.
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {
        }
    }

    KeyManager "memory" {
        plugin_data {
        }
    }

    # Attests workloads on this node by inspecting local process state
    # (UID/GID) — no network challenge, unlike ACME's HTTP-01/DNS-01.
    WorkloadAttestor "unix" {
        plugin_data {
        }
    }
}
